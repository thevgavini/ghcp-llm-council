t><text x="390" y="616" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Meta, DeepSeek, Mistral, Phi, Cohere</text><g><path d="M192,228 L192,290" fill="none" stroke="#8c7dff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.55"></path><polygon points="192,290 189.59971534781184,283.42439101006835 194.40028465218816,283.42439101006835" fill="#8c7dff" opacity="0.6"></polygon><g><rect x="166.4" y="243" width="51.2" height="14" rx="4" fill="#0c0c0e" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"></rect><text x="192" y="253" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="8.5" fill="#6a6a72" text-anchor="middle" font-weight="500">dispatch</text></g></g><g><path d="M192,452 L192,476" fill="none" stroke="#8c7dff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.55"></path><polygon points="192,476 189.59971534781184,469.42439101006835 194.40028465218816,469.42439101006835" fill="#8c7dff" opacity="0.6"></polygon></g><text x="720" y="274" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#6a6a72" letter-spacing="0.1em">PERSISTENCE</text><rect x="720" y="292" width="580" height="160" rx="16" fill="#1c1c21" stroke="rgba(255,255,255,0.06)" stroke-width="1"></rect><text x="748" y="322" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f3f3f5">.llm-council/</text><text x="748" y="346" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" fill="#c8c8cf">All deliberation state lives in a project-local directory</text><text x="748" y="374" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" fill="#6a6a72">state/server-info.json, server.pid, council.json</text><text x="748" y="396" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" fill="#6a6a72">conversations/&lt;uuid&gt;.json — full history per deliberation</text><text x="748" y="418" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" fill="#6a6a72">state/events.jsonl — structured event log (future UI replay)</text><text x="748" y="440" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" fill="#6a6a72">Persisted after stage 3 chairman synthesis</text><g><path d="M870,228 L870,290" fill="none" stroke="#6a6a72" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.55"></path><polygon points="870,290 867.5997153478119,283.42439101006835 872.4002846521881,283.42439101006835" fill="#6a6a72" opacity="0.6"></polygon><g><rect x="847.6" y="243" width="44.800000000000004" height="14" rx="4" fill="#0c0c0e" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"></rect><text x="870" y="253" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="8.5" fill="#6a6a72" text-anchor="middle" font-weight="500">persist</text></g></g><rect x="72" y="680" width="1256" height="170" rx="16" fill="#1c1c21" stroke="rgba(140,125,255,0.25)" stroke-width="1"></rect><rect x="72" y="680" width="1256" height="170" rx="16" fill="#8c7dff" opacity="0.03"></rect><g><circle cx="108" cy="716" r="18" fill="#8c7dff" opacity="0.04"></circle><circle cx="108" cy="716" r="10.8" fill="#8c7dff" opacity="0.08"></circle><circle cx="108" cy="716" r="6" fill="#8c7dff"></circle></g><text x="132" y="720" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#8c7dff" letter-spacing="-0.02em">Key Design Principle</text><line x1="108" y1="738" x2="1292" y2="738" stroke="rgba(140,125,255,0.25)" stroke-width="0.5"></line><text x="108" y="768" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="11.5" fill="#c8c8cf">The agent orchestrates · the helper manages state · the server is just a display layer.</text><text x="108" y="796" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="11.5" fill="#c8c8cf">No model calls happen inside the server — it receives pre-computed deliberation results via REST PATCH.</text><text x="108" y="824" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10.5" fill="#6a6a72">This separation keeps the server zero-dependency, the skill fully portable, and every layer independently testable.</text><g opacity="0.1" transform="translate(1240, 780) scale(1.2)"><path d="M18 68 A40 40 0 0 1 82 68" stroke="#8c7dff" stroke-width="1.5" stroke-linecap="round" fill="none"></path><circle cx="18" cy="68" r="3.5" fill="#8c7dff"></circle><circle cx="32" cy="50" r="3.5" fill="#8c7dff"></circle><circle cx="50" cy="43" r="3.5" fill="#8c7dff"></circle><circle cx="68" cy="50" r="3.5" fill="#8c7dff"></circle><circle cx="82" cy="68" r="3.5" fill="#8c7dff"></circle><circle cx="50" cy="74" r="10" fill="#8c7dff" opacity="0.06"></circle><circle cx="50" cy="74" r="6" fill="#8c7dff" opacity="0.12"></circle><circle cx="50" cy="74" r="3.5" fill="#8c7dff"></circle></g></svg>