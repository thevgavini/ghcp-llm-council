/text></g></g><g><path d="M990,186 L1078,186" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.55"></path><polygon points="1078,186 1071.4243910100683,188.40028465218816 1071.4243910100683,183.59971534781184" fill="#5eead4" opacity="0.6"></polygon><g><rect x="1005.2" y="170" width="57.6" height="14" rx="4" fill="#0c0c0e" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"></rect><text x="1034" y="180" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="8.5" fill="#6a6a72" text-anchor="middle" font-weight="500">WebSocket</text></g></g><text x="72" y="274" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#6a6a72" letter-spacing="0.1em">MODEL BACKENDS</text><text x="218" y="274" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9" fill="#6a6a72">Two inference paths — no extra API keys</text><rect x="72" y="292" width="560" height="160" rx="16" fill="#1c1c21" stroke="rgba(255,255,255,0.06)" stroke-width="1"></rect><text x="96" y="322" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f3f3f5">Copilot Inference (task tool)</text><text x="96" y="340" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Uses your existing Copilot subscription · parallel dispatch</text><g transform="translate(96, 360)"><g><circle cx="8" cy="10" r="12" fill="#d4855a" opacity="0.04"></circle><circle cx="8" cy="10" r="7.2" fill="#d4855a" opacity="0.08"></circle><circle cx="8" cy="10" r="4" fill="#d4855a"></circle></g><text x="20" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10.5" fill="#c8c8cf">Claude Sonnet 4.6</text><text x="180" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9" fill="#6a6a72">councillor</text></g><g transform="translate(96, 384)"><g><circle cx="8" cy="10" r="12" fill="#d4855a" opacity="0.04"></circle><circle cx="8" cy="10" r="7.2" fill="#d4855a" opacity="0.08"></circle><circle cx="8" cy="10" r="4" fill="#d4855a"></circle></g><text x="20" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10.5" fill="#c8c8cf">Claude Opus 4.7</text><text x="180" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9" fill="#8c7dff">chairman</text></g><g transform="translate(96, 408)"><g><circle cx="8" cy="10" r="12" fill="#10a37f" opacity="0.04"></circle><circle cx="8" cy="10" r="7.2" fill="#10a37f" opacity="0.08"></circle><circle cx="8" cy="10" r="4" fill="#10a37f"></circle></g><text x="20" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10.5" fill="#c8c8cf">GPT-5.2</text><text x="180" y="14" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9" fill="#6a6a72">councillor</text></g><rect x="360" y="354" width="1" height="86" fill="rgba(255,255,255,0.06)"></rect><text x="390" y="372" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Backend: task</text><text x="390" y="392" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Model param → agent sub-task</text><text x="390" y="412" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">No credentials beyond Copilot</text><text x="390" y="432" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Parallel via background agents</text><rect x="72" y="478" width="560" height="160" rx="16" fill="#1c1c21" stroke="rgba(255,255,255,0.06)" stroke-width="1"></rect><text x="96" y="508" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f3f3f5">GitHub Models (models.github.ai)</text><text x="96" y="526" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9.5" fill="#6a6a72">Uses your gh auth token · sequential via helper call</text><g transform="translat